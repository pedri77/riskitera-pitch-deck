<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Riskitera Pitch Deck: Presentacion corporativa interactiva">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c2d4a"/>
      <stop offset="50%" stop-color="#0B4F7A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="160" r="220" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1100" cy="160" r="160" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1100" cy="160" r="100" fill="none" stroke="#60A5FA" stroke-width="0.5" opacity="0.1"/>

  <!-- Wordmark -->
  <text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">
    RISKITERA
  </text>
  <text x="80" y="165" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#93C5FD" letter-spacing="0.05em">
    PITCH DECK
  </text>

  <!-- Subtitle -->
  <text x="80" y="205" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="300" fill="#94A3B8">
    Presentacion corporativa interactiva · GRC + SOC + CTI
  </text>

  <!-- Pill chips -->
  <g transform="translate(80, 235)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#3B82F6" opacity="0.25" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="70" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93C5FD" text-anchor="middle">11 Slides</text>

    <rect x="155" y="0" width="160" height="32" rx="16" fill="#3B82F6" opacity="0.25" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="235" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93C5FD" text-anchor="middle">Video Demos</text>

    <rect x="330" y="0" width="160" height="32" rx="16" fill="#3B82F6" opacity="0.25" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="410" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93C5FD" text-anchor="middle">GitHub Pages</text>

    <rect x="505" y="0" width="160" height="32" rx="16" fill="#3B82F6" opacity="0.25" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="585" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#93C5FD" text-anchor="middle">ENS Alto Ready</text>
  </g>

  <!-- Version chip -->
  <rect x="80" y="282" width="100" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <text x="130" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#CBD5E1" text-anchor="middle">v1.0</text>

  <!-- Accent dot -->
  <circle cx="1100" cy="160" r="6" fill="#3B82F6" filter="url(#glow)"/>
</svg>
